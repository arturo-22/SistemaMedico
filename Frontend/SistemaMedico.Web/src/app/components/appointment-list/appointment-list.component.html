<div class="container mt-4">
  <div class="card shadow-sm">
    <div
      class="card-header bg-white d-flex flex-column flex-md-row justify-content-between align-items-center gap-3"
    >
      <h3 class="mb-0 text-primary text-center text-md-start">
        Gestión de Citas Médicas
      </h3>
      <a routerLink="/appointments/new" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Agendar Nueva Cita
      </a>
    </div>

    <div class="card-body bg-light border-bottom">
      <div class="row g-3">
        <div class="col-md-7">
          <div class="input-group">
            <span class="input-group-text bg-white"
              ><i class="bi bi-search"></i
            ></span>
            <input
              type="text"
              class="form-control"
              placeholder="Buscar por paciente o médico..."
              [(ngModel)]="filterText"
              (input)="applyFilters()"
            />
          </div>
        </div>
        <div class="col-md-5">
          <select
            class="form-select"
            [(ngModel)]="filterStatus"
            (change)="applyFilters()"
          >
            <option value="-1">-- Todos los estados --</option>
            <option [value]="Status.Pending">Pendiente</option>
            <option [value]="Status.Confirmed">Confirmada</option>
            <option [value]="Status.Attended">Atendida</option>
            <option [value]="Status.Cancelled">Cancelada</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light text-nowrap">
            <tr>
              <th>Paciente</th>
              <th>Médico</th>
              <th>Fecha y Hora</th>
              <th>Estado</th>
              <th>Motivo</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let appt of filteredAppointments">
              <td>{{ appt.patientFullName }}</td>
              <td>{{ appt.doctorName }}</td>
              <td class="text-nowrap">
                {{ appt.appointmentDate | date: "dd/MM/yyyy HH:mm" }}
              </td>
              <td>
                <span [ngClass]="getStatusClass(appt.status)">
                  {{ getStatusLabel(appt.status) }}
                </span>
              </td>
              <td>{{ appt.reason }}</td>
              <td class="text-center">
                <div class="d-inline-flex gap-2">
                  <ng-container *ngIf="appt.status < Status.Attended">
                    <button
                      (click)="openAttentionModal(appt)"
                      class="btn btn-sm btn-outline-success px-3"
                    >
                      Atender
                    </button>
                    <button
                      [routerLink]="['/appointments/edit', appt.id]"
                      class="btn btn-sm btn-outline-warning px-3"
                    >
                      Editar
                    </button>
                    <button
                      (click)="deleteAppointment(appt.id)"
                      class="btn btn-sm btn-outline-danger px-2"
                    >
                      Cancelar
                    </button>
                  </ng-container>

                  <div *ngIf="appt.status === Status.Attended">
                    <button
                      (click)="ViewSummaryAttention(appt)"
                      class="btn btn-sm btn-outline-secondary px-3"
                    >
                      <i class="bi bi-eye"></i> Ver receta
                    </button>
                  </div>

                  <div
                    *ngIf="appt.status === Status.Cancelled"
                    class="text-muted small fst-italic"
                  >
                    <i class="bi bi-slash-circle"></i> Cancelada
                  </div>
                </div>
              </td>
            </tr>
            <tr *ngIf="filteredAppointments.length === 0">
              <td colspan="6" class="text-center py-4 text-muted">
                No se encontraron citas.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<app-appointment-attend-modal
  *ngIf="selectedAppt"
  [appointment]="selectedAppt"
  (onSave)="confirmAttention($event)"
  (onClose)="closeModal()"
></app-appointment-attend-modal>
