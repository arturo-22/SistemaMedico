<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Atender: {{ appointment?.patientFullName }}</h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          (click)="Close()"
        ></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="atencionForm">
          <div class="mb-3">
            <label class="form-label fw-bold">Diagnóstico Médico</label>
            <textarea
              formControlName="diagnosis"
              class="form-control"
              [ngClass]="{
                'is-invalid':
                  atencionForm.get('diagnosis')?.invalid &&
                  atencionForm.get('diagnosis')?.touched,
              }"
              rows="3"
              placeholder="Ingrese el diagnóstico..."
            ></textarea>
            <div class="invalid-feedback">
              {{ getError("diagnosis") }}
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Tratamiento y Receta</label>
            <textarea
              formControlName="treatment"
              class="form-control"
              [ngClass]="{
                'is-invalid':
                  atencionForm.get('treatment')?.invalid &&
                  atencionForm.get('treatment')?.touched,
              }"
              rows="3"
              placeholder="Ingrese las indicaciones..."
            ></textarea>
            <div class="invalid-feedback">
              {{ getError("treatment") }}
            </div>
          </div>
        </form>
      </div>

      <div
        class="modal-footer bg-light d-flex justify-content-center justify-content-md-end gap-2"
      >
        <button type="button" class="btn btn-secondary px-3" (click)="Close()">
          Cancelar
        </button>
        <button
          type="button"
          class="btn btn-success px-4"
          (click)="save()"
          [disabled]="atencionForm.invalid"
        >
          Finalizar Atención
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop fade show"></div>
